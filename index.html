<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Knight Tour Visualizações</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b0f16;
      color: #e7edf7;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(760px, 92vw);
      background: #131b27;
      border: 1px solid #1f2b3d;
      border-radius: 12px;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 1.45rem; }
    p { margin: 0 0 16px; color: #9fb0c7; line-height: 1.5; }
    .links {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    a {
      text-decoration: none;
      color: #0b0f16;
      background: #9ad0ff;
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 600;
    }
    a:hover { filter: brightness(1.06); }
    code {
      background: #1a2536;
      color: #b8d7ff;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Knight Tour · Frontend</h1>
    <p>
      Visualizações já alimentadas por JSON local
      (<code>cavalo_data.json</code> e <code>assinaturas_6x6.json</code>),
      prontas para deploy estático.
    </p>
    <div class="links">
      <a href="./cavalo_viz.html">Abrir visualização do cavalo (8x8)</a>
      <a href="./unicornios_viz.html">Abrir visualização de unicórnios (6x6)</a>
    </div>
  </main>
</body>
</html>
