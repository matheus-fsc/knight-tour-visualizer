<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unicórnios Topológicos — 6x6</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b0f16;
      color: #e7edf7;
    }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    h1 { margin: 0 0 6px; font-size: 1.35rem; }
    .sub { margin: 0 0 20px; color: #9fb0c7; }
    .card {
      background: #131b27;
      border: 1px solid #1f2b3d;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
    }
    canvas {
      width: 100%;
      height: auto;
      border-radius: 8px;
      background: #0f1722;
      border: 1px solid #1e2a3a;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.95rem;
    }
    th, td {
      border-bottom: 1px solid #26354b;
      padding: 8px 10px;
      text-align: left;
    }
    th { color: #a8bdd9; font-weight: 600; }
    code { color: #9ad0ff; }
    .err { color: #ff8d9f; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Unicórnios Topológicos (caudas da distribuição)</h1>
    <p class="sub">Lê <code>assinaturas_6x6.json</code>, plota a curva por peso (<code>#True</code>) e destaca as caudas raras.</p>

    <div class="card">
      <canvas id="chart" width="1000" height="360"></canvas>
    </div>

    <div class="card">
      <h2 style="margin-top:0">Faixas raras (caudas)</h2>
      <div id="summary"></div>
      <table>
        <thead>
          <tr>
            <th>Peso (#True)</th>
            <th>Qtd. soluções</th>
            <th>Exemplos de índices no JSON</th>
          </tr>
        </thead>
        <tbody id="tail-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    function drawChart(canvas, labels, values, tailSet) {
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const pad = { l: 60, r: 20, t: 18, b: 50 };
      const pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;
      const vmax = Math.max(...values, 1);
      const n = labels.length;
      const barW = pw / n * 0.68;
      const gap = pw / n * 0.32;

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#0f1722";
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = "#2a3a52";
      ctx.lineWidth = 1;
      for (let k = 0; k <= 4; k++) {
        const y = pad.t + (ph * k / 4);
        ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
      }

      ctx.fillStyle = "#9db3cf";
      ctx.font = "12px system-ui";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let k = 0; k <= 4; k++) {
        const v = Math.round(vmax * (1 - k / 4));
        const y = pad.t + (ph * k / 4);
        ctx.fillText(String(v), pad.l - 8, y);
      }

      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      for (let i = 0; i < n; i++) {
        const x = pad.l + i * (barW + gap) + gap / 2;
        const h = Math.max(1, (values[i] / vmax) * ph);
        const y = pad.t + ph - h;
        const isTail = tailSet.has(labels[i]);
        ctx.fillStyle = isTail ? "#ff7aa2" : "#66c8ff";
        ctx.fillRect(x, y, barW, h);

        ctx.fillStyle = "#dce8f7";
        ctx.font = "11px system-ui";
        ctx.fillText(String(labels[i]), x + barW / 2, pad.t + ph + 8);
      }
    }

    async function main() {
      const summaryEl = document.getElementById("summary");
      const tailBody = document.getElementById("tail-body");
      try {
        const resp = await fetch("./assinaturas_6x6.json?v=" + Date.now(), { cache: "no-store" });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();

        const assinaturas = data.assinaturas_booleanas || [];
        if (!assinaturas.length) throw new Error("JSON sem assinaturas_booleanas");

        const pesos = assinaturas.map(sig => sig.reduce((a, b) => a + (b ? 1 : 0), 0));
        const hist = new Map();
        pesos.forEach(p => hist.set(p, (hist.get(p) || 0) + 1));
        const labels = Array.from(hist.keys()).sort((a, b) => a - b);
        const values = labels.map(k => hist.get(k));

        const caudaEsq = labels.slice(0, 2);
        const caudaDir = labels.slice(-2);
        const tails = Array.from(new Set([...caudaEsq, ...caudaDir])).sort((a, b) => a - b);
        const tailSet = new Set(tails);

        drawChart(document.getElementById("chart"), labels, values, tailSet);

        summaryEl.innerHTML =
          `<p>Total de soluções: <b>${assinaturas.length}</b> · Pesos observados: <b>${labels.join(", ")}</b><br>` +
          `Unicórnios (caudas destacadas): <b>${tails.join(", ")}</b></p>`;

        const byWeightIdx = new Map();
        pesos.forEach((p, i) => {
          if (!byWeightIdx.has(p)) byWeightIdx.set(p, []);
          byWeightIdx.get(p).push(i);
        });

        tailBody.innerHTML = "";
        for (const w of tails) {
          const idxs = byWeightIdx.get(w) || [];
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><b>${w}</b></td>
            <td>${hist.get(w) || 0}</td>
            <td>${idxs.slice(0, 16).join(", ")}${idxs.length > 16 ? " ..." : ""}</td>
          `;
          tailBody.appendChild(tr);
        }
      } catch (err) {
        summaryEl.innerHTML = `<p class="err">Erro ao carregar dados: ${err.message}</p>`;
      }
    }

    main();
  </script>
</body>
</html>
